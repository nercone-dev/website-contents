{% extends "/base.html" %}
{% block title %}今日の迷言 - Nercone{% endblock %}
{% block title_suffix %}Daily Quote{% endblock %}
{% block header_desc %}日替わり迷言集{% endblock %}
{% block extra_head %}
        <style>
            main {
                display: grid;
                grid-template-rows: 1fr auto;
            }
            .big-text {
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 32pt;
            }
        </style>
{% endblock %}
{% block content %}
            <p class="text-white big-text"><span class="text-bright-light-grey unselectable" translate="no">"</span>{{ get_daily_quote() }}<span class="text-bright-light-grey unselectable" translate="no">"</span></p>
            <div class="block">
                <p>日替わり迷言集です。毎日0:00 UTCに更新されます。</p>
            </div>
{% endblock %}
