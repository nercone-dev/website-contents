{% extends "/base.html" %}
{% block title %}nercone's website{% endblock %}
{% block description %}作りたいものを作り、やりたくないことからは逃げる学生{% endblock %}
{% block extra_head %}
        <style>
            main {
                flex: 1;
                display: flex;
            }
            .inner {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #big-text {
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 64pt;
            }
            @media (max-width: 512px) {
                #big-text {
                    font-size: 48pt;
                }
                #welcome-text {
                    font-size: 10pt;
                }
            }
        </style>
{% endblock %}
{% block content %}
            <div class="inner">
                <div class="flex-vertical">
                    <p id="big-text" class="font-bold text-white" style="padding-bottom: 0px; margin-bottom: 0px; text-box: trim-both cap alphabetic;" translate="no">NERCONE</p>
                    <p id="welcome-text" style="padding-top: 0px; margin-top: 0px; text-box: trim-both cap alphabetic;" translate="no">ようこそ・Welcome・<span class="font-nsasc">欢迎</span>・<span class="font-nsatc">歡迎</span>・<span class="font-nsakr">환영해요</span></p>
                </div>
            </div>
            <script>
                (() => {
                    const el = document.getElementById('big-text');
                    if (!el) return;
                    let tapCount = 0, tapTimer = null, lastTouch = 0;

                    function onTap() {
                        tapCount++;
                        if (tapCount >= 3) {
                            clearTimeout(tapTimer);
                            tapCount = 0;
                            typeof window.__navigate === 'function' ? window.__navigate('/qr-code/') : (location.href = '/qr-code/');
                            return;
                        }
                        clearTimeout(tapTimer);
                        tapTimer = setTimeout(() => { tapCount = 0; }, 400);
                    }

                    el.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        lastTouch = Date.now();
                        onTap();
                    }, { passive: false });

                    el.addEventListener('click', () => {
                        if (Date.now() - lastTouch < 300) return;
                        onTap();
                    });
                })();
            </script>
{% endblock %}
