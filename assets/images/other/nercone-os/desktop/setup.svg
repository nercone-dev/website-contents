    <text class="cls-9" transform="translate(154.04 530.61)"><tspan x="0" y="0">使い始める前に、いくつかの設定を終わらせませんか？</tspan></text>
    <text class="cls-11" transform="translate(155.04 582.26)"><tspan x="0" y="0">時間がない場合は、「後でセットアップ」を押して一時的にゲストユーザーを使用することもできます。</tspan><tspan x="0" y="16">次回の起動時、またはゲストユーザーのデスクトップにあるショートカットからいつでもセットアップに戻ることができます。</tspan><tspan x="0" y="32">ゲストユーザー内で行ったほとんどの変更は次回の起動時にリセットされます。重要なデータを取り扱う場合は先にセットアップを済ませることをおすすめします。</tspan></text>
