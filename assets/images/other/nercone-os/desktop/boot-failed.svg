  <text class="cls-8" transform="translate(197.96 117.69)"><tspan x="0" y="0">Ne</tspan><tspan class="cls-9" x="21.38" y="0">r</tspan><tspan x="27.14" y="0">coneOSの起動に失敗しました。下に表示されているログには、原因に関する情報が含まれている可能性があります。ログは /boot/firstboot/logs/</tspan><tspan class="cls-24" x="1076.38" y="0">f</tspan><tspan x="1082.05" y="0">ailed-52004bf5-6d4</tspan><tspan class="cls-26" x="1237.67" y="0">f</tspan><tspan x="1243.14" y="0">-4</tspan><tspan class="cls-24" x="1260.84" y="0">2</tspan><tspan x="1270.34" y="0">4e-bf3b</tspan><tspan class="cls-25" x="1332.77" y="0">-</tspan><tspan class="cls-24" x="1339.59" y="0">2</tspan><tspan x="1349.09" y="0">49b4bdbf83a.log に保存されています。</tspan><tspan x="0" y="18">Rキーを押すか、電源ボタンを4回連打することで、復旧環境から起動することができます。復旧環境は通常の用途には使用できませんが、コミュニティに相談したり、この問題を修正するために必要なツールが使用可能です。</tspan></text>
